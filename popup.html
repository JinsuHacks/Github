<!DOCTYPE html>
<html>
<head>
  <title>SmoothActions</title>
  <style>
    body { 
      width: 250px; 
      font-family: sans-serif; 
      padding: 10px; 
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <h2>SmoothActions</h2>

  <button id="copyCode">Copy All Code Blocks</button>
  <button id="cleanUrl">Clean URL</button>
  <button id="autoScroll">Auto Scroll</button>
  <button id="downloadImages">Download Images</button>

  <script src="popup.js"></script>
</body>
</html>
